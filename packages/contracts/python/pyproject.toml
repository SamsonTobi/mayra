[project]
name = "mayra-contracts"
version = "0.1.0"
description = "Generated + curated JSON Schema contracts for Mayra (Pydantic models)"
requires-python = ">=3.12,<3.13"
dependencies = ["pydantic>=2.9"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["mayra_contracts"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"

[dependency-groups]
dev = [
    "pytest>=9.0.3",
]
